<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template is working</title>

    <style>
        .nav-bar {
            background-color: rgb(38, 34, 34);
            display: flex;
            justify-content: center;
           
        }

        .box-left {
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        #li1 {
            display: flex;
            color: white;
            list-style-type: none;
            gap: 1rem;
            padding-top: 0.1rem;
        }

        h2 {
            color: white;
            padding-left: 1rem;
        }

        .box-right {
            padding: 1.5rem;
           
        }

        .final {
            margin-top: 3rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap:0.5rem;
            
        }

        .butaddinp {
            display: flex;
            flex-direction: column;
            position: relative;
            left: 16rem;
            margin: 2rem;
            gap: 1rem;
             
        }

        .inp
        {
            display: grid;
            grid-template-columns: repeat(2,1fr);
            
        }

        .for-item
        {
            max-width:100vw;
            overflow-x: hidden;
        }

        .text
        {
            font-size: 20px;
            border: 2px solid black;
            border-radius: 6px;
            resize: none       ;
        }

        .hel
        {
             color: red;
             font-size: 30px;
        }

        .inp-lab
        {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            width:max-content
        }

        #but1
        {
            width:10rem;
            padding:1rem;
            background-color: #5a67d8;
            color: white;
            border-radius: 6px;
            font-size: 20px;
            cursor: pointer;
        }

        .but
        {
             display: flex;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .radio {
         appearance: none;
         -webkit-appearance: none;
         -moz-appearance: none;
         position: relative;
         width: 22px;
         height: 22px;
         border: 2px solid #aaa;
         border-radius: 50%;
         outline: none;
         cursor: pointer;
         transition: all 0.25s ease-in-out;
         vertical-align: middle;
     }

       .radio:hover {
          border-color: #5a67d8;
          box-shadow: 0 0 5px #5a67d8aa;
    }

       .radio:checked {
          border-color: #5a67d8;
          background: radial-gradient(circle at center, #5a67d8 45%, transparent 50%);
          box-shadow: 0 0 5px #5a67d8aa;
    }

       .lab {
          font-family: "Poppins", sans-serif;
          font-size: 16px;
          color: #333;
          cursor: pointer;
          margin-right: 20px;
          user-select: none;
    }

       .toast-container {
          position: fixed;
          bottom: 20px;
          right: 20px;
          z-index: 1080;
    }

       .custom-toast {
          position: relative;
          min-width: 260px;
          padding: 12px 40px 12px 16px;
          border-radius: 6px;
          color: #fff;
          font-family: "Poppins", sans-serif;
          margin-top: 10px;
          box-shadow: 0 4px 10px rgba(0,0,0,0.15);
          opacity: 1;
          transition: opacity 0.5s ease, transform 0.3s ease;
    }

       .custom-toast.hide {
          opacity: 0;
          transform: translateY(20px);
    }

       .toast-body {
          font-size: 20px;
          line-height: 1.4;
    }

       .close-btn {
          position: absolute;
          top: 5px;
          right: 10px;
          background: none;
          border: none;
          color: #fff;
          font-size: 40px;
          cursor: pointer;
          line-height: 1;
          opacity: 0.8;
          color: black;
    }
       .close-btn:hover {
          opacity: 1;
    }

       .success {
          background: linear-gradient(135deg, #38a169, #48bb78);
          color: black;
    }
       .warning {
          background: linear-gradient(135deg, #e53e3e, #f56565);
          color: black;
    }
       .error {
          background: linear-gradient(135deg, #e53e3e, #f56565);
          color: black;
    }
       .info {
          background: linear-gradient(135deg, #3182ce, #63b3ed);
          color:black
    }

@media (max-width: 1024px) {

  .butaddinp {
    left: 0;
    margin: 1.5rem 0.5rem;
  }

  .text {
    max-width: 100%;
    max-height: 120px;
    font-size: 18px;
  }

  .inp {
    grid-template-columns: 1fr;
    gap: 1rem;
  }

  .nav-bar h1 {
    font-size: 28px;
  }

  #but1 {
    width: 8rem;
    font-size: 18px;
  }

  .hel {
    text-align: center;
    font-size: 20px;
  }
}

@media (max-width: 768px) {
  .nav-bar {
    flex-direction: column;
    align-items: center;
    
  }

  h1 {
    font-size: 20px;
    text-align: center;
  }

  .final {
    margin-top: 2rem;
    padding: 0 1rem;
    text-align: center;
  }

  .text {
    width: 100%;
    height: 160px;
    font-size: 16px;
  }

  .inp {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .inp-lab {
    flex-wrap: wrap;
    gap: 0.3rem;
  }

  .radio {
    width: 18px;
    height: 18px;
  }

  #but1 {
    width: 90%;
    padding: 0.8rem;
    font-size: 18px;
  }

  .toast-container {
    right: 10px;
    bottom: 10px;
    max-width: 70vw;
  }

  .custom-toast {
    max-width: 70vw;
    width: 100%;
    padding: 10px 35px 10px 12px;
  }

  .close-btn {
    font-size: 28px;
    right: 6px;
    top: 2px;
  }
}

@media (max-width: 480px) {
  .hel {
    font-size: 20px;
  }

  h1 {
    font-size: 22px;
  }

  .text {
    font-size: 15px;
    height: 140px;
  }

  #but1 {
    font-size: 16px;
    padding: 0.7rem;
  }

  .toast-body {
    font-size: 16px;
  }

  #mai
  {
    margin-top: 0.7rem;
  }
}
    </style>
</head>

<body class="for-item">
    <form action="/tech" method="post"> {% csrf_token %}  

        <nav class="nav-bar">
            <div class="box-left">
                <h1>TextUtils.in</h1>
            </div>

        </nav>

        <div class="final">
            <h3 class="hel">Analyze Your Text and Make It More Understandable</h3>
            <textarea class="text" name="text" style="margin: 0px; width: 936px; height: 207px;"></textarea>
        </div>

        <div class="butaddinp">
            <div class="inp">

                <div>
                  <div class="inp-lab"><input type="radio" name="val" class="radio">
                  <label for="val" class="lab">Remove Punctuations</label></div>

                  <br/>
               
                  <div class="inp-lab"><input type="radio" name="val1" class="radio">
                  <label for="val1" class="lab">Captalize Text</label></div>
                </div>
            
                <div id="mai">
                  <div class="inp-lab"><input type="radio" name="spr" class="radio">
                  <label for="spr" class="lab">Space Remover</label></div>

                  <br/>
               
                  <div class="inp-lab"><input type="radio" name="nlr" class="radio">
                  <label for="nlr" class="lab">Newline Remover</label></div>
                </div>

            </div>
        </div>

        <div class="but">
            <button type="submit" id="but1">Analyze</button>
        </div>

   {% if messages %}
      {% for message in messages %}
        <div class="custom-toast {{ message.tags }}">
          <div class="toast-body">
            {{ message }}
          </div>
          <button class="close-btn" onclick="this.parentElement.remove();">&times;</button>
        </div>
      {% endfor %}
    {% endif %}

    </form>
</body>

</html>
